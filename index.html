<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduTrack | Professional Attendance System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-add { background: var(--primary); color: white; }
        .btn-freeze { background: var(--secondary); color: white; }
        .btn-pdf { background: #000; color: white; }
        .btn-reset { background: var(--danger); color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        th { background-color: #f1f5f9; }

        .status-select {
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }
        
        .frozen-overlay {
            display: none;
            color: var(--danger);
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Attendance Register</h1>
            <p id="semester-info">Status: <span id="sem-status" style="color: var(--success);">Active Session</span></p>
        </div>
        <div style="text-align: right;">
            <button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
            <button class="btn-reset" onclick="newSemester()">New Semester</button>
        </div>
    </header>

    <div id="freeze-msg" class="frozen-overlay">ATTENDANCE FROZEN - RECORDS LOCKED</div>

    <div class="controls">
        <input type="text" id="studentName" placeholder="Enter Student Name...">
        <button class="btn-add" id="addBtn" onclick="addStudent()">Add Student</button>
    </div>

    <div class="controls" style="grid-template-columns: 1fr 1fr;">
        <button class="btn-freeze" id="freezeBtn" onclick="toggleFreeze()">Freeze Attendance (End Semester)</button>
        <button class="btn-add" id="unfreezeBtn" style="display:none;" onclick="toggleFreeze()">Unfreeze (Edit Mode)</button>
    </div>

    <table id="attendanceTable">
        <thead>
            <tr>
                <th>Student Name</th>
                <th>Today's Status</th>
                <th>Total Days</th>
                <th>Attendance %</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    let students = JSON.parse(localStorage.getItem('students')) || [];
    let isFrozen = JSON.parse(localStorage.getItem('isFrozen')) || false;

    // Initialize UI
    function init() {
        renderTable();
        updateFreezeUI();
    }

    function addStudent() {
        const nameInput = document.getElementById('studentName');
        if (!nameInput.value) return;

        const newStudent = {
            id: Date.now(),
            name: nameInput.value,
            presentCount: 0,
            totalSessions: 0,
            history: []
        };

        students.push(newStudent);
        nameInput.value = '';
        saveAndRender();
    }

    function updateAttendance(id, value) {
        if (isFrozen) return;
        
        const student = students.find(s => s.id === id);
        student.totalSessions += 1;

        if (value === "Present") student.presentCount += 1;
        else if (value === "Half-Day") student.presentCount += 0.5;
        // Absent adds 0 to presentCount

        saveAndRender();
    }

    function calculatePercentage(present, total) {
        if (total === 0) return "100%";
        return ((present / total) * 100).toFixed(1) + "%";
    }

    function toggleFreeze() {
        isFrozen = !isFrozen;
        localStorage.setItem('isFrozen', JSON.stringify(isFrozen));
        updateFreezeUI();
    }

    function updateFreezeUI() {
        const msg = document.getElementById('freeze-msg');
        const addBtn = document.getElementById('addBtn');
        const freezeBtn = document.getElementById('freezeBtn');
        const unfreezeBtn = document.getElementById('unfreezeBtn');
        const statusText = document.getElementById('sem-status');

        if (isFrozen) {
            msg.style.display = 'block';
            addBtn.disabled = true;
            freezeBtn.style.display = 'none';
            unfreezeBtn.style.display = 'inline-block';
            statusText.innerText = "Semester Ended / Frozen";
            statusText.style.color = "var(--danger)";
        } else {
            msg.style.display = 'none';
            addBtn.disabled = false;
            freezeBtn.style.display = 'inline-block';
            unfreezeBtn.style.display = 'none';
            statusText.innerText = "Active Session";
            statusText.style.color = "var(--success)";
        }
        renderTable();
    }

    function newSemester() {
        if (confirm("Create new semester form? This will clear all current student data.")) {
            students = [];
            isFrozen = false;
            saveAndRender();
            updateFreezeUI();
        }
    }

    function saveAndRender() {
        localStorage.setItem('students', JSON.stringify(students));
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        students.forEach(s => {
            const row = `
                <tr>
                    <td><strong>${s.name}</strong></td>
                    <td>
                        <select class="status-select" onchange="updateAttendance(${s.id}, this.value)" ${isFrozen ? 'disabled' : ''}>
                            <option value="">-- Mark --</option>
                            <option value="Present">Present (Default)</option>
                            <option value="Half-Day">Half-Day</option>
                            <option value="Absent">Absent</option>
                        </select>
                    </td>
                    <td>${s.totalSessions}</td>
                    <td><span class="badge" style="background: #dcfce7; color: #166534;">
                        ${calculatePercentage(s.presentCount, s.totalSessions)}
                    </span></td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    async function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.text("Semester Attendance Report", 14, 15);
        doc.setFontSize(10);
        doc.text(`Generated on: ${new Date().toLocaleDateString()}`, 14, 22);

        const tableData = students.map(s => [
            s.name, 
            s.totalSessions, 
            calculatePercentage(s.presentCount, s.totalSessions)
        ]);

        doc.autoTable({
            head: [['Student Name', 'Total Days', 'Attendance %']],
            body: tableData,
            startY: 30,
        });

        doc.save("Attendance_Report.pdf");
    }

    init();
</script>

</body>
</html>
